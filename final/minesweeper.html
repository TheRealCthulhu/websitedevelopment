<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Game</title>
    <style>
        body {
            width: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background-color: whitesmoke;
        }

        .overall {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;

        }

        .container {
            display: flex;
            border: 3px black solid;
            width: fit-content;
            padding: 10px;
            padding-top: 0px;
            flex-wrap: wrap;
            gap: 0px;

        }

        #gameOver {
            width: 10px;
            display: flex;
            justify-content: space-between;
            padding: 20px
        }



        .hidden {
            width: 20px;
            height: 20px;
            background-color: lightgray;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border-radius: 2px;
            border: 2px ridge black;
            color: transparent;
        }

        .visible {
            width: 20px;
            height: 20px;
            background-color: lightslategray;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border-radius: 2px;
            border: 2px ridge;
            justify-items: center;
            display: grid;
            place-items: center;
            font-size: 100%;
        }
    </style>
    <script src="minesweeper.js" defer></script>
</head>

<body>
    <div class="overall">
        <div class="container" id="bigBox">
            <div>
                <h2>Mines: <span id="mineCount">10</span> | Minesweeper | Time: <span id="timeDisplay">0</span></h2>
            </div>
            <br>
            <div class="container" id="mineBox"></div>
            <div class="container" id="gameOver"></div>
        </div>
    </div>
</body>

</html>
